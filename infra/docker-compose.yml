services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_PORT}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  kafka-init:
    image: bitnamilegacy/kafka:latest
    container_name: kafka-init
    depends_on:
      - kafka
    environment:
      - KAFKA_TOPIC_DATA=${KAFKA_TOPIC_DATA}
      - DATA_PARTITIONS=${DATA_PARTITIONS}
      - KAFKA_TOPIC_METRICS=${KAFKA_TOPIC_METRICS}
      - METRICS_PARTITIONS=${METRICS_PARTITIONS}
    volumes:
      - ./kafka/kafka-init.sh:/scripts/kafka-init.sh
    command: bash /scripts/kafka-init.sh

  mysql:
    image: mysql:8.0            
    container_name: mysql
    restart: always
    ports:
      - "${MYSQL_PORT}:3306"            
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      # Init table
      - ./mysql/db-users.sql:/docker-entrypoint-initdb.d/init.sql
      # Uncomment to keep data after down
      # - ./mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
    restart: always
    ports:
      - "${PMA_PORT}:80"

  api:
    build: ../api
    container_name: api
    ports:
      - "${API_PORT}:3000"
    environment:
      - PORT=3000 
      - API_PORT=${API_PORT} 
      - KAFKA_BROKER=kafka:29092
      - KAFKA_TOPIC_DATA=${KAFKA_TOPIC_DATA}
      - KAFKA_CLIENT_ID=${KAFKA_CLIENT_ID}
    depends_on:
      - kafka

  # SPARK CLUSTER
  spark-master:
    image: bitnamilegacy/spark:3.5.1 
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "${SPARK_CONSUMER_WEB_UI_PORT}:8080"

  spark-worker:
    image: bitnamilegacy/spark:3.5.1 
    container_name: spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_CONSUMER_WORKERS_MEM}
      - SPARK_WORKER_CORES=${SPARK_CONSUMER_WORKERS_CORES} 
    depends_on:
      - spark-master
    volumes:
      - ./spark:/opt/bitnami/spark/jobs