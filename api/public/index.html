<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen p-6">

    <header class="mb-8 border-b border-gray-700 pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                DASHBOARD
            </h1>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">

        <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 shadow-lg flex flex-col justify-center items-center text-center">
            <h2 class="text-gray-400 text-sm font-semibold uppercase tracking-wider mb-2">Total Ingested (API)</h2>
            <div id="total-users" class="text-5xl font-black text-blue-400 tabular-nums">0</div>
            <p class="text-gray-500 text-xs mt-2 font-mono">Pushed to Kafka Queue</p>
        </div>

        <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 shadow-lg flex flex-col justify-center items-center text-center">
            <h2 class="text-gray-400 text-sm font-semibold uppercase tracking-wider mb-2">True DB Count</h2>
            <div id="db-count" class="text-5xl font-black text-emerald-400 tabular-nums">0</div>
            <p class="text-gray-500 text-xs mt-2 font-mono">Confirmed in MySQL</p>
        </div>

        <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 shadow-lg flex flex-col justify-center items-center text-center">
            <h2 class="text-gray-400 text-sm font-semibold uppercase tracking-wider mb-2">Kafka Lag</h2>
            <div id="kafka-lag" class="text-5xl font-black text-rose-400 tabular-nums">0</div>
            <p class="text-gray-500 text-xs mt-2 font-mono">Messages Pending</p>
        </div>

        <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 shadow-lg flex flex-col justify-center items-center text-center">
            <h2 class="text-gray-400 text-sm font-semibold uppercase tracking-wider mb-2">Spark Throughput</h2>
            <div class="flex items-baseline gap-2">
                <div id="throughput" class="text-5xl font-black text-amber-400 tabular-nums">0</div>
                <span class="text-gray-400 font-bold">r/s</span>
            </div>
            <p class="text-gray-500 text-xs mt-2 font-mono">Rows/sec to MySQL</p>
        </div>

        <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 shadow-lg col-span-1 md:col-span-2 lg:col-span-4 flex flex-col justify-center items-center">
            <h2 class="text-gray-400 text-sm font-semibold uppercase tracking-wider mb-4">End-to-End Latency (Seconds)</h2>
            <div class="flex w-full justify-around text-center">
                <div>
                    <div class="text-gray-500 text-xs uppercase mb-1">Minimum</div>
                    <div id="lat-min" class="text-3xl font-bold text-green-400 tabular-nums">0.000</div>
                </div>
                <div>
                    <div class="text-gray-500 text-xs uppercase mb-1">Average</div>
                    <div id="lat-avg" class="text-4xl font-black text-blue-400 tabular-nums">0.000</div>
                </div>
                <div>
                    <div class="text-gray-500 text-xs uppercase mb-1">Maximum</div>
                    <div id="lat-max" class="text-3xl font-bold text-red-400 tabular-nums">0.000</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 shadow-lg">
        <h2 class="text-gray-400 text-sm font-semibold uppercase tracking-wider mb-4">Live Raw Feed (Samples)</h2>
        <div class="bg-gray-900 rounded border border-gray-700 h-64 overflow-y-auto p-4 font-mono text-xs" id="live-feed">
            </div>
    </div>

    <script>
        const socket = io();

        // DOM Refs
        const totalUsersEl = document.getElementById('total-users');
        const dbCountEl = document.getElementById('db-count');
        const kafkaLagEl = document.getElementById('kafka-lag');
        const throughputEl = document.getElementById('throughput');
        const latMinEl = document.getElementById('lat-min');
        const latAvgEl = document.getElementById('lat-avg');
        const latMaxEl = document.getElementById('lat-max');
        const liveFeedEl = document.getElementById('live-feed');

        // State vars
        let totalIngested = 0;
        let dbCount = 0;
        let bufferedCount = 0;
        let userLogsBuffer = [];

        socket.on('user_update_batch', (payload) => {
            bufferedCount += payload.count;
            
            userLogsBuffer.push(...payload.samples);
            
            if (userLogsBuffer.length > 20) {
                userLogsBuffer = userLogsBuffer.slice(-20);
            }
        });

        socket.on('metrics_update', (metric) => {
            dbCount += metric.count; 
            dbCountEl.innerText = dbCount.toLocaleString();

            throughputEl.innerText = Math.round(metric.throughput).toLocaleString();
            latMinEl.innerText = metric.min_latency.toFixed(3);
            latAvgEl.innerText = metric.avg_latency.toFixed(3);
            latMaxEl.innerText = metric.max_latency.toFixed(3);
        });

        setInterval(() => {
            if (bufferedCount > 0) {
                totalIngested += bufferedCount;
                totalUsersEl.innerText = totalIngested.toLocaleString();
                bufferedCount = 0;
            }
            
            const lag = Math.max(0, totalIngested - dbCount);
            kafkaLagEl.innerText = lag.toLocaleString();

            if (userLogsBuffer.length > 0) {
                let htmlString = "";
                userLogsBuffer.forEach(user => {
                    htmlString += `
                        <div class="mb-1 flex gap-3 text-gray-300 border-l-2 border-blue-500 pl-2">
                            <span class="text-green-400 font-bold">[${new Date().toLocaleTimeString()}]</span> 
                            <span class="text-blue-300 font-bold uppercase">${user.city}</span> 
                            <span>${user.name} (${user.age} yo) ingested.</span>
                        </div>
                    `;
                });
                
                liveFeedEl.insertAdjacentHTML('afterbegin', htmlString);
                userLogsBuffer = [];

                while (liveFeedEl.children.length > 50) {
                    liveFeedEl.lastElementChild.remove();
                }
            }
        }, 250);
    </script>
</body>
</html>
