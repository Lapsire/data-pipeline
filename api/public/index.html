<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #1a1a1a;
            font-family: 'JetBrains Mono', monospace;
            color: #eee;
        }
        #terminal-container {
            background-color: #000;
            border: 2px solid #333;
            height: 70vh;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }
        .log-line {
            font-size: 0.9rem;
            border-bottom: 1px solid #111;
        }
        .timestamp { color: #666; }
        .badge-kafka { font-size: 0.7rem; vertical-align: middle; }
    </style>
</head>
<body class="py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="text-success m-0">DATA_STREAM_MONITOR</h2>
            </div>

            <div id="terminal-container" class="rounded p-3 shadow-lg">
                <div id="logs">
                    <p class="text-secondary">[SYSTEM] Initializing console...</p>
                </div>
            </div>

            <p class="mt-3 text-secondary small text-center">
                Listening on topic: <code class="text-info">users</code>
            </p>

        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const logsContainer = document.getElementById('logs');
    const terminal = document.getElementById('terminal-container');

    socket.on('user_update', (data) => {
        const time = new Date().toLocaleTimeString();
        
        const div = document.createElement('div');
        div.className = 'log-line py-1';
        div.innerHTML = `
            <span class="timestamp">[${time}]</span> 
            <span class="text-info">INCOMING:</span> 
            <span class="text-warning">${data.name}</span> 
            <span class="text-muted">from</span> 
            <span class="text-success">${data.city}</span>
        `;
        
        logsContainer.appendChild(div);

        terminal.scrollTop = terminal.scrollHeight;
    });
</script>

</body>
</html>
